<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Classroom</title>
    <link rel="icon" type="image/png" href="https://mmm-tek.github.io/classroom.png">
    <style>
        :root { --chrome-bg: #dee1e6; --tab-active: #ffffff; --toolbar-bg: #ffffff; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--chrome-bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Barra de Pestañas */
        .tab-bar { display: flex; align-items: flex-end; padding: 8px 8px 0; gap: 4px; background: var(--chrome-bg); }
        .tab { background: #bdc1c6; padding: 8px 15px; border-radius: 8px 8px 0 0; min-width: 130px; font-size: 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border: none; }
        .tab.active { background: var(--tab-active); border-bottom: 1px solid white; }
        .tab-close { margin-left: 10px; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .tab-close:hover { background: #e8eaed; }
        .new-tab { background: none; border: none; font-size: 20px; cursor: pointer; padding: 0 10px 5px; color: #5f6368; }

        /* Herramientas */
        .toolbar { background: var(--toolbar-bg); padding: 5px 12px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #dcdee1; }
        .nav-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: #5f6368; width: 32px; height: 32px; border-radius: 50%; }
        .nav-btn:hover { background: #f1f3f4; }
        
        .address-bar { flex-grow: 1; background: #f1f3f4; border-radius: 20px; padding: 6px 18px; display: flex; align-items: center; font-size: 14px; }
        #url-input { border: none; background: transparent; width: 100%; outline: none; margin-left: 5px; color: #202124; }
        .lock { font-size: 12px; margin-right: 5px; }
        .domain { color: #5f6368; font-weight: 500; white-space: nowrap; }

        /* Contenido */
        #viewport { flex-grow: 1; background: white; position: relative; }
        iframe { width: 100%; height: 100%; border: none; display: none; }
        iframe.active { display: block; }
    </style>
</head>
<body>

<div class="tab-bar" id="tabs">
    <button class="new-tab" onclick="addTab()">+</button>
</div>

<div class="toolbar">
    <button class="nav-btn" onclick="goBack()" title="Back">←</button>
    <button class="nav-btn" onclick="reload()" title="Reload">↻</button>
    <div class="address-bar">
        <span class="lock">🔒</span>
        <span class="domain">https://mmm-tek.github.io</span>
        <input type="text" id="url-input" placeholder="URL" onkeydown="if(event.key==='Enter') navigate()">
    </div>
</div>

<div id="viewport"></div>

<script>
    const DOMAIN = "https://mmm-tek.github.io";
    let activeId = null;

    function addTab() {
        const id = 't' + Date.now();
        
        // Botón de pestaña
        const btn = document.createElement('button');
        btn.className = 'tab';
        btn.id = 'btn-' + id;
        btn.innerHTML = `<span>mmm-tek</span><span class="tab-close" onclick="closeTab(event,'${id}')">×</span>`;
        btn.onclick = () => selectTab(id);
        document.getElementById('tabs').insertBefore(btn, document.querySelector('.new-tab'));

        // Iframe
        const ifr = document.createElement('iframe');
        ifr.id = 'ifr-' + id;
        ifr.src = DOMAIN;
        // Sandbox que permite navegar internamente pero bloquea errores de dominio
        ifr.setAttribute('sandbox', 'allow-scripts allow-forms allow-same-origin allow-popups allow-popups-to-escape-sandbox');
        document.getElementById('viewport').appendChild(ifr);

        selectTab(id);
    }

    function navigate() {
        const input = document.getElementById('url-input').value.trim();
        const fullUrl = input.includes('://') || input.includes('www.') ? input : DOMAIN + input;

        // Si la URL no es de mmm-tek, abrir en pestaña real
        if (!fullUrl.startsWith(DOMAIN)) {
            window.open(fullUrl.startsWith('http') ? fullUrl : 'https://' + fullUrl, '_blank');
            // Restauramos la URL interna para no confundir
            document.getElementById('url-input').value = "";
            return;
        }

        const ifr = document.getElementById('ifr-' + activeId);
        ifr.src = fullUrl;
    }

    function goBack() {
        const ifr = document.getElementById('ifr-' + activeId);
        // Usamos el historial real del iframe
        try {
            ifr.contentWindow.history.back();
        } catch(e) {
            // Si el navegador bloquea el acceso por seguridad (CORS), 
            // al menos recargamos al inicio del dominio para no quedar atrapados.
            ifr.src = DOMAIN;
        }
    }

    function reload() {
        const ifr = document.getElementById('ifr-' + activeId);
        ifr.src = ifr.src;
    }

    function selectTab(id) {
        activeId = id;
        document.querySelectorAll('.tab, iframe').forEach(el => el.classList.remove('active'));
        document.getElementById('btn-' + id).classList.add('active');
        document.getElementById('ifr-' + id).classList.add('active');
    }

    function closeTab(e, id) {
        e.stopPropagation();
        document.getElementById('btn-' + id).remove();
        document.getElementById('ifr-' + id).remove();
        const keys = document.querySelectorAll('.tab');
        if (keys.length > 0) selectTab(keys[keys.length - 1].id.replace('btn-',''));
        else addTab();
    }

    // Iniciar
    addTab();
</script>
</body>
</html>
