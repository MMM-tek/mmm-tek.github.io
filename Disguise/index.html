<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chrome Simulator - Anti Block Edition</title>
    <style>
        :root { --bg: #dee1e6; --tab: #ffffff; --toolbar: #ffffff; --text: #202124; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Navigation Bar */
        .tab-bar { display: flex; align-items: flex-end; padding: 8px 8px 0; gap: 4px; background: var(--bg); }
        .tab { background: #bdc1c6; padding: 8px 15px; border-radius: 8px 8px 0 0; min-width: 130px; font-size: 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .tab.active { background: var(--tab); font-weight: 500; }
        .tab-close { margin-left: 10px; width: 16px; height: 16px; text-align: center; border-radius: 50%; }
        .tab-close:hover { background: #e8eaed; }
        .new-btn { background: none; border: none; font-size: 20px; cursor: pointer; padding: 0 10px 5px; color: #5f6368; }

        /* Toolbar */
        .toolbar { background: var(--toolbar); padding: 5px 12px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #dcdee1; }
        .nav-btn { background: none; border: none; font-size: 18px; cursor: pointer; color: #5f6368; border-radius: 50%; width: 30px; height: 30px; }
        .nav-btn:hover { background: #f1f3f4; }
        
        .address-bar { flex-grow: 1; background: #f1f3f4; border-radius: 20px; padding: 6px 18px; display: flex; align-items: center; font-size: 14px; }
        #url-input { border: none; background: transparent; width: 100%; outline: none; margin-left: 4px; }
        .lock { font-size: 12px; margin-right: 6px; color: #5f6368; }
        .prefix { color: #5f6368; font-weight: bold; }

        /* Frame Area */
        #viewport { flex-grow: 1; background: #fff; position: relative; }
        iframe { width: 100%; height: 100%; border: none; display: none; }
        iframe.active { display: block; }
    </style>
</head>
<body>

<div class="tab-bar" id="tabs">
    <button class="new-btn" onclick="addTab()">+</button>
</div>

<div class="toolbar">
    <button class="nav-btn" onclick="navHistory(-1)">←</button>
    <button class="nav-btn" onclick="reload()">↻</button>
    <div class="address-bar">
        <span class="lock">🔒</span>
        <span class="prefix">https://mmm-tek.github.io</span>
        <input type="text" id="url-input" placeholder="URL" onkeydown="if(event.key==='Enter') handleURL()">
    </div>
</div>

<div id="viewport"></div>

<script>
    const DOMAIN = "https://mmm-tek.github.io";
    let tabs = {};
    let activeId = null;

    function addTab() {
        const id = 't' + Date.now();
        tabs[id] = { history: [DOMAIN], index: 0 };
        
        const btn = document.createElement('div');
        btn.className = 'tab';
        btn.id = 'btn-' + id;
        btn.innerHTML = `<span>mmm-tek</span><span class="tab-close" onclick="closeTab(event,'${id}')">×</span>`;
        btn.onclick = () => selectTab(id);
        document.getElementById('tabs').insertBefore(btn, document.querySelector('.new-btn'));

        const ifr = document.createElement('iframe');
        ifr.id = 'ifr-' + id;
        ifr.src = DOMAIN;
        // Sandbox configurado para forzar que los clics externos se abran fuera si intentan romper el frame
        ifr.setAttribute('sandbox', 'allow-scripts allow-forms allow-same-origin allow-popups allow-popups-to-escape-sandbox');
        document.getElementById('viewport').appendChild(ifr);

        selectTab(id);
    }

    function handleURL() {
        const input = document.getElementById('url-input').value.trim();
        
        // DETECCIÓN: Si la URL es externa (contiene .com, .net, http, etc. y NO es nuestro dominio)
        const isExternal = (input.includes('.') || input.includes('://')) && !input.includes('mmm-tek.github.io');

        if (isExternal) {
            let target = input.startsWith('http') ? input : 'https://' + input;
            alert("Redirecting to external site in a new real tab to prevent 'Connection Refused' error.");
            window.open(target, '_blank'); // Abre en el navegador real
            
            // Limpia la barra de direcciones volviendo a la ruta interna
            document.getElementById('url-input').value = tabs[activeId].history[tabs[activeId].index].replace(DOMAIN, "");
            return;
        }

        // Si es interna, navega normal
        const fullUrl = DOMAIN + input;
        const tab = tabs[activeId];
        tab.history = tab.history.slice(0, tab.index + 1);
        tab.history.push(fullUrl);
        tab.index++;
        document.getElementById('ifr-' + activeId).src = fullUrl;
    }

    function selectTab(id) {
        activeId = id;
        document.querySelectorAll('.tab, iframe').forEach(el => el.classList.remove('active'));
        document.getElementById('btn-' + id).classList.add('active');
        document.getElementById('ifr-' + id).classList.add('active');
        
        const path = tabs[id].history[tabs[id].index].replace(DOMAIN, "");
        document.getElementById('url-input').value = (path === DOMAIN) ? "" : path;
    }

    function closeTab(e, id) {
        e.stopPropagation();
        document.getElementById('btn-' + id).remove();
        document.getElementById('ifr-' + id).remove();
        delete tabs[id];
        const keys = Object.keys(tabs);
        if (keys.length > 0) selectTab(keys[keys.length - 1]);
        else addTab();
    }

    function navHistory(dir) {
        const t = tabs[activeId];
        if (dir === -1 && t.index > 0) {
            t.index--;
            document.getElementById('ifr-' + activeId).src = t.history[t.index];
            selectTab(activeId);
        }
    }

    function reload() {
        const ifr = document.getElementById('ifr-' + activeId);
        ifr.src = ifr.src;
    }

    addTab();
</script>
</body>
</html>
