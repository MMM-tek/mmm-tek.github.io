<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chrome Simulator - Ultimate Anti-Block</title>
    <style>
        :root { --bg: #dee1e6; --tab: #ffffff; --toolbar: #ffffff; --text: #202124; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Tab Bar */
        .tab-bar { display: flex; align-items: flex-end; padding: 8px 8px 0; gap: 4px; background: var(--bg); }
        .tab { background: #bdc1c6; padding: 8px 15px; border-radius: 8px 8px 0 0; min-width: 130px; font-size: 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border: none; }
        .tab.active { background: var(--tab); font-weight: 500; border-bottom: 1px solid white; }
        .tab-close { margin-left: 10px; width: 18px; height: 18px; text-align: center; border-radius: 50%; font-size: 14px; }
        .tab-close:hover { background: #e8eaed; }
        .new-btn { background: none; border: none; font-size: 22px; cursor: pointer; padding: 0 12px 5px; color: #5f6368; }

        /* Toolbar */
        .toolbar { background: var(--toolbar); padding: 5px 12px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #dcdee1; }
        .nav-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: #5f6368; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; }
        .nav-btn:hover { background: #f1f3f4; }
        
        .address-bar { flex-grow: 1; background: #f1f3f4; border-radius: 20px; padding: 6px 18px; display: flex; align-items: center; font-size: 14px; border: 1px solid transparent; }
        .address-bar:focus-within { background: #fff; border-color: #8ab4f8; }
        #url-input { border: none; background: transparent; width: 100%; outline: none; margin-left: 5px; color: var(--text); }
        .prefix { color: #5f6368; font-weight: bold; white-space: nowrap; }

        /* External Button */
        .external-btn { background: #1a73e8; color: white; border: none; border-radius: 4px; padding: 6px 12px; font-size: 12px; cursor: pointer; font-weight: 500; white-space: nowrap; }
        .external-btn:hover { background: #1765cc; }

        /* Viewport */
        #viewport { flex-grow: 1; background: #fff; position: relative; }
        iframe { width: 100%; height: 100%; border: none; display: none; }
        iframe.active { display: block; }
    </style>
</head>
<body>

<div class="tab-bar" id="tabs-container">
    <button class="new-btn" onclick="addTab()">+</button>
</div>

<div class="toolbar">
    <div style="display:flex; gap:5px;">
        <button class="nav-btn" onclick="navBack()">←</button>
        <button class="nav-btn" onclick="reload()">↻</button>
    </div>
    <div class="address-bar">
        <span style="font-size:12px; margin-right:5px;">🔒</span>
        <span class="prefix">https://mmm-tek.github.io</span>
        <input type="text" id="url-input" placeholder="URL" onkeydown="if(event.key==='Enter') handleGo()">
    </div>
    <button class="external-btn" onclick="openOutside()" title="Open in real browser if page fails">Open Outside ↗</button>
</div>

<div id="viewport"></div>

<script>
    const DOMAIN = "https://mmm-tek.github.io";
    let tabs = {};
    let activeId = null;

    function addTab() {
        const id = 't' + Date.now();
        tabs[id] = { history: [DOMAIN], index: 0 };
        
        const btn = document.createElement('button');
        btn.className = 'tab';
        btn.id = 'btn-' + id;
        btn.innerHTML = `<span>mmm-tek</span><span class="tab-close" onclick="closeTab(event,'${id}')">×</span>`;
        btn.onclick = () => selectTab(id);
        document.getElementById('tabs-container').insertBefore(btn, document.querySelector('.new-btn'));

        const ifr = document.createElement('iframe');
        ifr.id = 'ifr-' + id;
        ifr.src = DOMAIN;
        // La clave es "allow-popups-to-escape-sandbox"
        // Esto permite que si un enlace interno va a MakeCode, el navegador lo abra FUERA del simulador.
        ifr.setAttribute('sandbox', 'allow-scripts allow-forms allow-same-origin allow-popups allow-popups-to-escape-sandbox allow-modals');
        document.getElementById('viewport').appendChild(ifr);

        selectTab(id);
    }

    function handleGo() {
        const val = document.getElementById('url-input').value.trim();
        const isFullUrl = val.includes('.') || val.includes('://');

        // Si el usuario escribe algo que NO es de mmm-tek, lo abrimos fuera directamente
        if (isFullUrl && !val.includes('mmm-tek.github.io')) {
            const external = val.startsWith('http') ? val : 'https://' + val;
            window.open(external, '_blank');
            // Reset input
            document.getElementById('url-input').value = tabs[activeId].history[tabs[activeId].index].replace(DOMAIN, "");
            return;
        }

        // Navegación interna segura
        const full = DOMAIN + val;
        const t = tabs[activeId];
        t.history = t.history.slice(0, t.index + 1);
        t.history.push(full);
        t.index++;
        document.getElementById('ifr-' + activeId).src = full;
    }

    function openOutside() {
        const currentIfr = document.getElementById('ifr-' + activeId);
        const path = document.getElementById('url-input').value;
        window.open(DOMAIN + path, '_blank');
    }

    function selectTab(id) {
        activeId = id;
        document.querySelectorAll('.tab, iframe').forEach(el => el.classList.remove('active'));
        document.getElementById('btn-' + id).classList.add('active');
        document.getElementById('ifr-' + id).classList.add('active');
        const path = tabs[id].history[tabs[id].index].replace(DOMAIN, "");
        document.getElementById('url-input').value = (path === DOMAIN) ? "" : path;
    }

    function closeTab(e, id) {
        e.stopPropagation();
        document.getElementById('btn-' + id).remove();
        document.getElementById('ifr-' + id).remove();
        delete tabs[id];
        const keys = Object.keys(tabs);
        if (keys.length > 0) selectTab(keys[keys.length - 1]);
        else addTab();
    }

    function navBack() {
        const t = tabs[activeId];
        if (t.index > 0) {
            t.index--;
            document.getElementById('ifr-' + activeId).src = t.history[t.index];
            selectTab(activeId);
        }
    }

    function reload() {
        const ifr = document.getElementById('ifr-' + activeId);
        ifr.src = ifr.src;
    }

    addTab();
</script>
</body>
</html>
