<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chrome Simulator - Fixed Navigation</title>
    <style>
        :root {
            --chrome-bg: #dee1e6;
            --tab-active: #ffffff;
            --tab-inactive: #bdc1c6;
            --toolbar-bg: #ffffff;
        }

        body { margin: 0; font-family: sans-serif; background: var(--chrome-bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Tabs */
        .tab-bar { display: flex; align-items: flex-end; padding: 8px 8px 0; gap: 4px; background: var(--chrome-bg); }
        .tab { 
            background: var(--tab-inactive); padding: 8px 12px; border-radius: 8px 8px 0 0; 
            min-width: 120px; font-size: 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; 
        }
        .tab.active { background: var(--tab-active); }
        .tab-close { margin-left: 10px; border-radius: 50%; width: 16px; height: 16px; text-align: center; line-height: 16px; }
        .tab-close:hover { background: #bbb; }
        .new-tab-btn { background: none; border: none; font-size: 20px; cursor: pointer; padding: 0 10px; }

        /* Toolbar */
        .toolbar { background: var(--toolbar-bg); padding: 5px 10px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #ccc; }
        .nav-btn { background: none; border: none; font-size: 18px; cursor: pointer; color: #5f6368; padding: 5px; border-radius: 50%; }
        .nav-btn:disabled { color: #ccc; cursor: default; }
        .address-bar { 
            flex-grow: 1; background: #f1f3f4; border-radius: 20px; padding: 5px 15px; 
            display: flex; align-items: center; font-size: 14px; 
        }
        #url-input { border: none; background: transparent; width: 100%; outline: none; }
        .domain-lock { color: #5f6368; font-weight: bold; }

        /* Content */
        #viewport { flex-grow: 1; background: white; }
        iframe { width: 100%; height: 100%; border: none; display: none; }
        iframe.active { display: block; }
    </style>
</head>
<body>

<div class="tab-bar" id="tab-bar">
    <button class="new-tab-btn" onclick="createNewTab()">+</button>
</div>

<div class="toolbar">
    <button class="nav-btn" id="back-btn" onclick="goBack()">←</button>
    <button class="nav-btn" onclick="reloadTab()">↻</button>
    <div class="address-bar">
        <span class="domain-lock">https://mmm-tek.github.io</span>
        <input type="text" id="url-input" placeholder="URL" onkeypress="checkEnter(event)">
    </div>
</div>

<div id="viewport"></div>

<script>
    const DOMAIN = "https://mmm-tek.github.io";
    let tabs = {}; // Store tab data: { id: { history: [], currentIndex: -1 } }
    let activeTabId = null;

    function createNewTab() {
        const id = 'tab-' + Date.now();
        tabs[id] = { history: [DOMAIN], currentIndex: 0 };

        // Create Tab UI
        const tabEl = document.createElement('div');
        tabEl.className = 'tab';
        tabEl.id = 'btn-' + id;
        tabEl.innerHTML = `<span>mmm-tek</span> <span class="tab-close" onclick="closeTab(event, '${id}')">×</span>`;
        tabEl.onclick = () => switchTab(id);
        document.getElementById('tab-bar').insertBefore(tabEl, document.querySelector('.new-tab-btn'));

        // Create Iframe
        const ifr = document.createElement('iframe');
        ifr.id = 'ifr-' + id;
        ifr.src = DOMAIN;
        document.getElementById('viewport').appendChild(ifr);

        switchTab(id);
    }

    function switchTab(id) {
        activeTabId = id;
        document.querySelectorAll('.tab, iframe').forEach(el => el.classList.remove('active'));
        
        document.getElementById('btn-' + id).classList.add('active');
        document.getElementById('ifr-' + id).classList.add('active');

        const currentPath = tabs[id].history[tabs[id].currentIndex].replace(DOMAIN, "");
        document.getElementById('url-input').value = currentPath;
        updateNavButtons();
    }

    function closeTab(e, id) {
        e.stopPropagation();
        document.getElementById('btn-' + id).remove();
        document.getElementById('ifr-' + id).remove();
        delete tabs[id];

        const remaining = Object.keys(tabs);
        if (remaining.length > 0) {
            switchTab(remaining[remaining.length - 1]);
        } else {
            createNewTab();
        }
    }

    function checkEnter(e) {
        if (e.key === 'Enter') {
            const path = document.getElementById('url-input').value;
            const fullUrl = DOMAIN + path;
            navigateTo(fullUrl);
        }
    }

    function navigateTo(url) {
        if (!url.startsWith(DOMAIN)) {
            const confirmLeave = confirm("This URL is outside mmm-tek.github.io. Do you want to open it in a real new window?");
            if (confirmLeave) window.open(url, '_blank');
            return;
        }

        const tab = tabs[activeTabId];
        // Remove forward history if we are in the middle of it
        tab.history = tab.history.slice(0, tab.currentIndex + 1);
        tab.history.push(url);
        tab.currentIndex++;
        
        document.getElementById('ifr-' + activeTabId).src = url;
        updateNavButtons();
    }

    function goBack() {
        const tab = tabs[activeTabId];
        if (tab.currentIndex > 0) {
            tab.currentIndex--;
            const prevUrl = tab.history[tab.currentIndex];
            document.getElementById('ifr-' + activeTabId).src = prevUrl;
            document.getElementById('url-input').value = prevUrl.replace(DOMAIN, "");
            updateNavButtons();
        }
    }

    function reloadTab() {
        const ifr = document.getElementById('ifr-' + activeTabId);
        ifr.src = ifr.src;
    }

    function updateNavButtons() {
        document.getElementById('back-btn').disabled = (tabs[activeTabId].currentIndex <= 0);
    }

    // Initialize
    createNewTab();
</script>

</body>
</html>
